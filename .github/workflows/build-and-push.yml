name: Build and push images

on:
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
      ref_type:
        required: true
        type: string
      sha:
        required: true
        type: string
      origin_changed:
        required: false
        type: boolean
        default: true
      mantle_changed:
        required: false
        type: boolean
        default: true
      facet_changed:
        required: false
        type: boolean
        default: true
      chorus_changed:
        required: false
        type: boolean
        default: true
      stream:
        required: false
        type: boolean
        default: true
      init_changed:
        required: false
        type: boolean
        default: true
      home_changed:
        required: false
        type: boolean
        default: true
      verso_package:
        required: false
        type: string
        default: ''
        description: >-
          Optional pip-install spec for the Verso runtime package. Empty
          (default) builds the public Verso from chorus/verso/. Set to
          a wheel URL or pinned package name (e.g. "verso-premium==1.2.0")
          to build the premium variant — wired by the private CI repo.
    secrets:
      DOCKERHUB_NAMESPACE:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      VERSO_INDEX_URL:
        required: false

concurrency:
  group: build-and-push-${{ inputs.ref_name || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Read build version
        id: build-info
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(python3 -c "
          import json, pathlib
          data = json.loads(pathlib.Path('build_info.json').read_text())
          v = str(data.get('version', '')).strip()
          if not v: raise SystemExit('build_info.json must contain a non-empty version string')
          print(v)
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate stable release tag matches build_info
        shell: bash
        env:
          REF_NAME: ${{ inputs.ref_name || github.ref_name }}
          REF_TYPE: ${{ inputs.ref_type || github.ref_type }}
          BUILD_VERSION: ${{ steps.build-info.outputs.version }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            TAG_VERSION="${REF_NAME#v}"
            if printf '%s' "$TAG_VERSION" | grep -q -- '-'; then
              echo "Prerelease image publishing should come from release/* branches, not prerelease Git tags." >&2
              exit 1
            fi
            if [ "$TAG_VERSION" != "$BUILD_VERSION" ]; then
              echo "Release tag version '$TAG_VERSION' does not match build_info.json version '$BUILD_VERSION'." >&2
              exit 1
            fi
          fi

      # -----------------------------------------------------------------
      # Registry login — Docker Hub
      # -----------------------------------------------------------------

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------
      # Tag matrix
      #
      #   branch main          → :edge  :edge-<sha7>
      #   branch release/X.Y   → :stable-rc  :<X.Y>-rc-<sha7>
      #
      # Images pushed to Docker Hub only:
      #   agience/<image>:<tag>
      # -----------------------------------------------------------------

      - name: Prepare image tags
        id: tags
        env:
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail
          REF_NAME="${{ inputs.ref_name || github.ref_name }}"
          REF_TYPE="${{ inputs.ref_type || github.ref_type }}"
          FULL_SHA="${{ inputs.sha || github.sha }}"
          SHORT_SHA="$(printf '%s' "$FULL_SHA" | cut -c1-7)"

          if [ "$REF_TYPE" = "branch" ]; then
            case "$REF_NAME" in
              main)
                TAGS=("edge" "edge-$SHORT_SHA")
                ;;
              release/*)
                RELEASE_LINE="${REF_NAME#release/}"
                if ! printf '%s' "$RELEASE_LINE" | grep -Eq '^[0-9]+\.[0-9]+$'; then
                  echo "Release branch name must be release/X.Y (for example release/1.2)." >&2
                  exit 1
                fi
                TAGS=("stable-rc" "${RELEASE_LINE}-rc-${SHORT_SHA}")
                ;;
              *)
                echo "Unsupported branch publish target: $REF_NAME" >&2
                exit 1
                ;;
            esac
          elif [ "$REF_TYPE" = "tag" ]; then
            VERSION="${REF_NAME#v}"
            if printf '%s' "$VERSION" | grep -q -- '-'; then
              echo "Prerelease Git tags are not supported. Use release/* branch publishing." >&2
              exit 1
            fi
            RELEASE_LINE="${VERSION%.*}"
            TAGS=("stable" "$RELEASE_LINE" "$VERSION")
          else
            echo "Unsupported ref type: $REF_TYPE" >&2
            exit 1
          fi

          # Emit multi-line tag lists for each image (Docker Hub only)
          IMAGES=(agience-origin agience-mantle agience-facet agience-chorus agience-stream agience-init agience-home)
          OUTPUT_NAMES=(origin mantle facet chorus stream init home)

          for i in "${!IMAGES[@]}"; do
            IMG="${IMAGES[$i]}"
            OUT="${OUTPUT_NAMES[$i]}"
            {
              echo "${OUT}<<EOF"
              for tag in "${TAGS[@]}"; do
                echo "${DOCKERHUB_NS}/${IMG}:${tag}"
              done
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push origin
        if: inputs.origin_changed != false
        uses: docker/build-push-action@v5
        with:
          context: .
          file: package/docker/origin.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.origin }}
          build-args: APP_VERSION=${{ steps.build-info.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push mantle
        if: inputs.mantle_changed != false
        uses: docker/build-push-action@v5
        with:
          context: .
          file: package/docker/mantle.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.mantle }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push facet
        if: inputs.facet_changed != false
        uses: docker/build-push-action@v5
        with:
          context: .
          file: package/docker/facet.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.facet }}
          build-args: GIT_SHA=${{ inputs.sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push chorus (unified MCP host)
        if: inputs.chorus_changed != false
        uses: docker/build-push-action@v5
        with:
          context: .
          file: package/docker/chorus.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.chorus }}
          build-args: |
            VERSO_PACKAGE=${{ inputs.verso_package || '' }}
          secrets: |
            verso_index_url=${{ secrets.VERSO_INDEX_URL || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push stream ingest service (SRS RTMP)
        if: inputs.stream != false
        uses: docker/build-push-action@v5
        with:
          context: src/chorus/astra
          file: src/chorus/astra/stream/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.stream }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push init container
        if: inputs.init_changed != false
        uses: docker/build-push-action@v5
        with:
          context: .
          file: package/docker/Dockerfile.init
          push: true
          tags: ${{ steps.tags.outputs.init }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push home Caddy image
        if: inputs.home_changed != false
        uses: docker/build-push-action@v5
        with:
          context: .
          file: package/install/home/Dockerfile.caddy
          push: true
          tags: ${{ steps.tags.outputs.home }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
