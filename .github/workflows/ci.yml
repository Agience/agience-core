name: CI

on:
  push:
    branches:
      - main
      - 'dev/**'
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - 'dev/**'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      mantle: ${{ steps.filter.outputs.mantle }}
      facet: ${{ steps.filter.outputs.facet }}
      docs: ${{ steps.filter.outputs.docs }}
      publish: ${{ steps.filter.outputs.publish }}
      build_origin: ${{ steps.filter.outputs.build_origin }}
      build_mantle: ${{ steps.filter.outputs.build_mantle }}
      build_facet: ${{ steps.filter.outputs.build_facet }}
      build_chorus: ${{ steps.filter.outputs.build_chorus }}
      build_stream: ${{ steps.filter.outputs.build_stream }}
      build_init: ${{ steps.filter.outputs.build_init }}
      build_home: ${{ steps.filter.outputs.build_home }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            mantle:
              - 'src/mantle/**'
            facet:
              - 'src/facet/**'
              - 'package/types/**'
            docs:
              - 'docs/**'
              - '.dev/**'
            publish:
              - 'src/origin/**'
              - 'src/mantle/**'
              - 'src/facet/**'
              - 'src/chorus/**'
              - 'src/kernel/**'
              - 'package/types/**'
              - 'package/docker/**'
              - 'package/install/**'
              - 'build_info.json'
              - 'package.json'
              - '.github/workflows/build-and-push.yml'
            build_origin:
              - 'src/origin/**'
              - 'src/kernel/**'
              - 'package/docker/origin.Dockerfile'
              - 'src/mantle/requirements.txt'
              - 'src/chorus/manifest.json'
              - 'build_info.json'
              - '.github/workflows/build-and-push.yml'
            build_mantle:
              - 'src/mantle/**'
              - 'src/kernel/**'
              - 'package/docker/mantle.Dockerfile'
              - 'build_info.json'
              - '.github/workflows/build-and-push.yml'
            build_facet:
              - 'src/facet/**'
              - 'package/types/**'
              - 'package/docker/facet.Dockerfile'
              - 'build_info.json'
              - '.github/workflows/build-and-push.yml'
            build_chorus:
              - 'src/chorus/**'
              - '!src/chorus/astra/stream/**'
              - 'package/docker/chorus.Dockerfile'
              - 'build_info.json'
              - '.github/workflows/build-and-push.yml'
            build_stream:
              - 'src/chorus/astra/stream/**'
              - 'build_info.json'
              - '.github/workflows/build-and-push.yml'
            build_init:
              - 'package/docker/init.py'
              - 'package/docker/Dockerfile.init'
              - '.github/workflows/build-and-push.yml'
            build_home:
              - 'package/install/home/**'
              - '.github/workflows/build-and-push.yml'

  mantle:
    name: mantle lint & tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        working-directory: src/mantle
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: No mantle changes
        if: needs.changes.outputs.mantle != 'true'
        run: echo "No mantle changes detected; skipping mantle lint/test steps."

      - name: Install system dependencies
        if: needs.changes.outputs.mantle == 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Setup Python
        if: needs.changes.outputs.mantle == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/mantle/requirements.txt

      - name: Upgrade pip
        if: needs.changes.outputs.mantle == 'true'
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        if: needs.changes.outputs.mantle == 'true'
        run: pip install -r requirements.txt

      - name: Install lint tooling
        if: needs.changes.outputs.mantle == 'true'
        run: pip install ruff

      - name: Lint (ruff)
        if: needs.changes.outputs.mantle == 'true'
        run: ruff check .

      - name: Run pytest suite
        if: needs.changes.outputs.mantle == 'true'
        env:
          OPENAI_API_KEY: placeholder
          JWT_SECRET_KEY: placeholder
        run: pytest tests -n auto --dist=loadfile --timeout=120

  facet:
    name: Facet lint & tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
    defaults:
      run:
        shell: bash
        working-directory: src/facet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: No facet changes
        if: needs.changes.outputs.facet != 'true'
        run: echo "No facet changes detected; skipping facet lint/test steps."

      - name: Setup Node.js
        if: needs.changes.outputs.facet == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/facet/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.facet == 'true'
        run: npm ci

      - name: Lint (eslint)
        if: needs.changes.outputs.facet == 'true'
        run: npm run lint

      - name: Build (type-check + bundle)
        if: needs.changes.outputs.facet == 'true'
        run: npm run build

      - name: Run vitest suite
        if: needs.changes.outputs.facet == 'true'
        run: npm run test

  docs-links:
    name: Docs link check
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: No docs changes
        if: needs.changes.outputs.docs != 'true'
        run: echo "No docs changes detected; skipping docs link check."

      - name: Checkout repository
        if: needs.changes.outputs.docs == 'true'
        uses: actions/checkout@v5

      - name: Prepare lychee output directory
        if: needs.changes.outputs.docs == 'true'
        run: mkdir -p lychee

      - name: Run lychee link checker (offline)
        if: needs.changes.outputs.docs == 'true'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --offline
            --no-progress
            --exclude-path '_archive/'
            --exclude-path 'node_modules/'
            --exclude-path '17-full-source-dump\.md'
            'docs/**/*.md'
          output: lychee/lychee-report.md
          format: markdown
          fail: true
          jobSummary: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload lychee report artifact
        if: needs.changes.outputs.docs == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee/lychee-report.md

  publish-images:
    name: Publish images
    needs:
      - changes
      - mantle
      - facet
      - docs-links
    if: >-
      github.repository != 'Agience/agience-core-private' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref_name == 'main' || startsWith(github.ref_name, 'release/')) &&
      (github.ref_name == 'main' || needs.changes.outputs.publish == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-and-push.yml
    with:
      ref_name: ${{ github.ref_name }}
      ref_type: ${{ github.ref_type }}
      sha: ${{ github.sha }}
      origin_changed: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.build_origin == 'true' }}
      mantle_changed: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.build_mantle == 'true' }}
      facet_changed: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.build_facet == 'true' }}
      chorus_changed: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.build_chorus == 'true' }}
      stream: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.build_stream == 'true' }}
      init_changed: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.build_init == 'true' }}
      home_changed: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.build_home == 'true' }}
    secrets:
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

