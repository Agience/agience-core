name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      (github.event_name == 'pull_request_target' && github.event.action != 'closed')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: .github/cla-signatures.json
          path-to-document: https://github.com/Agience/agience-core/blob/main/CLA.md
          branch: main
          allowlist: bot*,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your pull request!

            Before we can merge your contribution, you must sign the **Agience Contributor License Agreement**.

            To sign, please add a comment to this PR with the following exact text:

            > I have read the CLA Document and I hereby sign the CLA

            Once signed, the check will update automatically and a maintainer can review your PR.
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
