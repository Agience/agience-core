name: Deploy suite

# Deploys my.agience.ai manually from the Actions tab.
#
# Requires:
#   DEPLOY_TOKEN_MY — a PAT with `workflow` scope for Agience/agience-host-my.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-my-agience:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger my.agience.ai deploy (latest stable)
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN_MY }}
        run: |
          gh workflow run release.yml \
            --repo Agience/agience-host-my \
            --ref release
          echo "Triggered my.agience.ai deploy (latest stable)"

      - name: Write summary
        run: |
          echo "### my.agience.ai deploy triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered manually" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check [agience-host-my Actions](https://github.com/Agience/agience-host-my/actions) for deploy status." >> "$GITHUB_STEP_SUMMARY"
