# Base service definitions — deployment/runtime defaults.
# This file pulls images and sets shared runtime configuration.
# Local source builds and host port exposure belong in overlay files.
# Ports are NOT exposed here; they are added by overlay files:
#   docker-compose.override.yml  → local/dev (exposes ports, builds backend/frontend from source)
#   optional host overlay        → production proxy, custom ports, or host-specific settings
#
# Usage (run from repo root):
#   dev   (infra only, apps run locally):
#         docker compose --project-directory . -f docker/docker-compose.yml up -d content graph search
#   local (full stack, built from source):
#         docker compose --project-directory . -f docker/docker-compose.yml -f docker/docker-compose.override.yml up --build -d
#   deploy (full stack, pull from registry):
#         docker compose --project-directory . -f docker/docker-compose.yml up -d
#   deploy+overlay (registry images, plus any host-specific overlay):
#         docker compose --project-directory . -f docker/docker-compose.yml -f path/to/your-overlay.yml up -d
#
# NOTE: --project-directory . keeps volume paths relative to the repo root.
# Source build contexts live only in docker-compose.override.yml.
#
# ZERO-CONFIG BOOTSTRAP:
# The init service generates all required secrets (
# encryption key, platform secret, setup token) on first boot. No .env file
# is needed — all configuration is entered via the setup wizard in the browser.
# Keys are stored in DATA_PATH/.data/keys — back this directory up.

name: ${COMPOSE_PROJECT_NAME:-agience}

services:

  # One-shot init container: creates data directories and generates all key material.
  # This is the ONLY place keys are ever written — backend never generates keys.
  # Published image contains init.py with cryptography pre-installed.
  init:
    image: ${REGISTRY:-agience}/agience-init:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-agience}-init
    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGO_ROOT_PASSWORD:-}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-}
    volumes:
      - ${DATA_PATH:-./.data}:/data

  content:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: ${COMPOSE_PROJECT_NAME:-agience}-content
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-agience}
    entrypoint: ["/bin/sh", "-c", "export MINIO_ROOT_PASSWORD=$(cat /run/keys/minio.pass) && exec /usr/bin/docker-entrypoint.sh server /data --console-address :9001"]
    volumes:
      - ${DATA_PATH:-./.data}/minio:/data
      - ${DATA_PATH:-./.data}/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully

  graph:
    image: arangodb:3.11
    container_name: ${COMPOSE_PROJECT_NAME:-agience}-graph
    restart: unless-stopped
    environment:
      - ARANGO_NO_AUTH=${ARANGO_NO_AUTH:-0}
    entrypoint: ["/bin/sh", "-c", "export ARANGO_ROOT_PASSWORD=$(cat /run/keys/arango.pass) && exec /entrypoint.sh arangod"]
    volumes:
      - ${DATA_PATH:-./.data}/arangodb:/var/lib/arangodb3
      - ${DATA_PATH:-./.data}/arangodb-apps:/var/lib/arangodb3-apps
      - ${DATA_PATH:-./.data}/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully

  # OpenSearch retired in Step 2.6.9 (2026-05-09). Search now runs entirely
  # inside mantle on encrypted MANTLE-SSE posting lists in S3 (see content
  # service). The previous `search:` block (opensearchproject/opensearch)
  # was removed.

  # stream: SRS 5 — pure RTMP/HLS streaming gateway (Icecast-style relay).
  # Receives inbound RTMP from OBS/encoders; serves HLS to browsers.
  # Calls Mantle webhooks on publish/unpublish to drive artifact lifecycle.
  # No application logic lives here — session creation and grant checks are
  # handled by Mantle's stream router.
  stream:
    image: ${REGISTRY:-agience}/agience-stream:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-agience}-stream
    restart: unless-stopped
    environment:
      - STREAM_WEBHOOK_URI=${STREAM_WEBHOOK_URI:-http://mantle:8081}
      - STREAM_HLS_FRAGMENT=${STREAM_HLS_FRAGMENT:-4}
      - STREAM_HLS_WINDOW=${STREAM_HLS_WINDOW:-60}
    volumes:
      - ${DATA_PATH:-./.data}/stream:/var/stream
    depends_on:
      init:
        condition: service_completed_successfully

  origin:
    image: ${REGISTRY:-agience}/agience-origin:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-agience}-origin
    restart: unless-stopped
    environment:
      - BUILD_INFO_PATH=/app/build_info.json
      - ORIGIN_DB_PATH=/app/.data/origin/origin.db
      - KEYS_DIR=/app/.data/keys
      - ORIGIN_URI=${ORIGIN_URI:-http://localhost:8080}
      - FRONTEND_URI=${FRONTEND_URI:-http://localhost:5173}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
    volumes:
      - ${DATA_PATH:-./.data}/keys:/app/.data/keys:ro
      - ${DATA_PATH:-./.data}/origin:/app/.data/origin
    depends_on:
      init:
        condition: service_completed_successfully

  mantle:
    image: ${REGISTRY:-agience}/agience-mantle:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-agience}-mantle
    restart: unless-stopped
    environment:
      - BUILD_INFO_PATH=/app/build_info.json
      - ARANGO_HOST=${ARANGO_HOST:-graph}
      - AGIENCE_SERVER_HOST_URI=${AGIENCE_SERVER_HOST_URI:-http://chorus:8082}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-agience}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - KEYS_DIR=/app/.data/keys
      - ORIGIN_URI=${ORIGIN_URI:-http://origin:8080}
      # Embeddings is an external service — set EMBEDDINGS_URI to a reachable
      # /embed endpoint (e.g. a managed GPU host). Unset → lexical-only search.
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-agience}
      - EMBEDDINGS_URI=${EMBEDDINGS_URI:-}
      - EMBEDDINGS_API_KEY=${EMBEDDINGS_API_KEY:-}
      - EMBEDDINGS_DIM=${EMBEDDINGS_DIM:-1024}
    volumes:
      - ${DATA_PATH:-./.data}/keys:/app/.data/keys:ro
    depends_on:
      content:
        condition: service_started
      graph:
        condition: service_started

  facet:
    image: ${REGISTRY:-agience}/agience-facet:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-agience}-facet
    restart: unless-stopped
    environment:
      VITE_MANTLE_URI: ${VITE_MANTLE_URI:-http://localhost:8081}
      VITE_ORIGIN_URI: ${VITE_ORIGIN_URI:-http://localhost:8080}
      VITE_CLIENT_ID: ${VITE_CLIENT_ID:-}
      VITE_TITLE: ${VITE_TITLE:-Agience}
      VITE_FAVICON: ${VITE_FAVICON:-/favicon.ico}
    depends_on:
      mantle:
        condition: service_started
