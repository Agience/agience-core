namespace: agience
slug: agience-anchorset
content_type: application/vnd.agience.collection+json
name: Agience AnchorSet
description: >-
  The shared coordinate system of meaning — the platform's verified anchor
  ontology. Its members are anchor artifacts; together they are the routing
  centroids of MANTLE's encrypted search and the grounding registry for Anchored
  reasoning. Users receive read access automatically (it is common grounded
  knowledge); the anchors themselves are generated by the MANTLE bootstrap and
  grow as the manifold grows.
