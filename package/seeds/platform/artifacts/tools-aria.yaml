content: |
  # Aria — Tool Catalog

  **Role:** Output & Presentation

  Formats and presents final responses for humans. Last-mile communication and visualization layer.

  ## Available Tools

  ### `format_response`
  Format content for human consumption with appropriate markup and layout.

  ### `render_visualization`
  Create charts, diagrams, or visual representations of structured data.

  ### `adapt_tone`
  Adjust language tone and style for a target audience.

  ### `present_card`
  Present a card's content with appropriate formatting for human review.

  ### `narrate`
  Generate a natural-language narrative from structured data.

  ### `run_chat_turn`
  Run one agentic chat turn with tool calling. Returns the assistant reply and tool call log.

  ---
  *6 tools available in Aria.*
