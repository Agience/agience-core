# Agience Canary — standalone local install (localhost ports, no build required)
#
# Pulls the latest canary images from Docker Hub on every start.
# The init container generates all credentials on first boot.
# Platform settings are configured through the setup wizard in the browser.
#
# Install:   curl -fsSL https://raw.githubusercontent.com/Agience/agience-core/main/packaging/install/canary/install.sh | sh
#            irm  https://raw.githubusercontent.com/Agience/agience-core/main/packaging/install/canary/install.ps1 | iex
# Start:     docker compose up -d
# Open:      http://localhost:5173
# Update:    docker compose pull && docker compose up -d

services:

  # ── Init — generates all key material on first boot ──────────────────
  # Idempotent: skips if keys already exist.

  init:
    image: agience/agience-init:canary
    pull_policy: always
    container_name: init
    volumes:
      - ./.data:/data

  # ── Data layer ───────────────────────────────────────────────────────

  graph:
    image: arangodb:3.11
    container_name: graph
    restart: unless-stopped
    environment:
      - ARANGO_NO_AUTH=0
    entrypoint: ["/bin/sh", "-c", "export ARANGO_ROOT_PASSWORD=$(cat /run/keys/arango.pass) && exec /entrypoint.sh arangod"]
    volumes:
      - ./.data/arangodb:/var/lib/arangodb3
      - ./.data/arangodb-apps:/var/lib/arangodb3-apps
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "(command -v wget >/dev/null && wget -qO- http://127.0.0.1:8529/_admin/server/availability >/dev/null) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  search:
    image: opensearchproject/opensearch:latest
    container_name: search
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - cluster.name=agience-search
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
      - OPENSEARCH_PERFORMANCE_ANALYZER_ENABLED=false
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - plugins.security.disabled=false
      - bootstrap.memory_lock=false
    entrypoint: ["/bin/sh", "-c", "export OPENSEARCH_INITIAL_ADMIN_PASSWORD=$(cat /run/keys/opensearch.pass) && exec /usr/share/opensearch/opensearch-docker-entrypoint.sh"]
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./.data/opensearch:/usr/share/opensearch/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL",
            "curl -sk -u \"admin:$(cat /run/keys/opensearch.pass)\" https://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  content:
    image: minio/minio:latest
    container_name: content
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=agience
    entrypoint: ["/bin/sh", "-c", "export MINIO_ROOT_PASSWORD=$(cat /run/keys/minio.pass) && exec /usr/bin/docker-entrypoint.sh server /data --console-address :9001"]
    volumes:
      - ./.data/minio:/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Platform services ────────────────────────────────────────────────

  backend:
    image: agience/agience-backend:canary
    pull_policy: always
    container_name: backend
    restart: unless-stopped
    environment:
      - BUILD_INFO_PATH=/app/build_info.json
      - ARANGO_HOST=graph
      - OPENSEARCH_HOST=search
      - AGIENCE_SERVER_HOST_URI=http://servers:8082
      - MINIO_ROOT_USER=agience
      - KEYS_DIR=/app/.data/keys
    volumes:
      - ./.data/keys:/app/.data/keys:ro
    ports:
      - "8081:8081"
    depends_on:
      content:
        condition: service_healthy
      graph:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/version', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  servers:
    image: agience/agience-servers:canary
    pull_policy: always
    container_name: servers
    restart: unless-stopped
    environment:
      - AGIENCE_API_URI=http://backend:8081
      - SRS_HTTP_API=http://stream:1985
      - STREAM_BASE_URL=http://stream:1985/live
      - STREAM_INGEST_URL=rtmp://localhost:1936/live
    volumes:
      - ./.data/nexus:/workspace
      - ./.data/stream:/var/stream
      - ./.data/keys:/run/secrets/keys:ro
    ports:
      - "8082:8082"
    depends_on:
      backend:
        condition: service_healthy

  stream:
    image: agience/agience-stream:canary
    pull_policy: always
    container_name: stream
    restart: unless-stopped
    environment:
      - BACKEND_URI=http://servers:8082/astra
    volumes:
      - ./.data/stream:/var/stream
    ports:
      - "1936:1936"
      - "1985:1985"

  frontend:
    image: agience/agience-frontend:canary
    pull_policy: always
    container_name: frontend
    restart: unless-stopped
    environment:
      - VITE_BACKEND_URI=http://localhost:8081
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
