# Agience Local — stable build, no domain, no TLS
#
# Self-contained — no .env file, no external config required.
# The init container generates all credentials on first boot.
# Runs on http://localhost:8080 — no domain or certificate needed.
#
# Set REGISTRY in environment to override the Docker Hub namespace (default: agience).
#
# Install:   irm https://raw.githubusercontent.com/Agience/agience-core/main/packaging/install/local/install.ps1 | iex
#            curl -fsSL https://raw.githubusercontent.com/Agience/agience-core/main/packaging/install/local/install.sh | sh
# Start:     docker compose up -d
# Open:      http://localhost:8080

services:

  # ── Init — generates all key material on first boot ──────────────────
  # Idempotent: skips if .data/.initialized exists.

  init:
    image: ${REGISTRY:-agience}/agience-init:${VERSION:-latest}
    container_name: init
    volumes:
      - ./.data:/data

  # ── Data layer ───────────────────────────────────────────────────────

  graph:
    image: arangodb:3.11
    container_name: graph
    restart: unless-stopped
    environment:
      - ARANGO_NO_AUTH=0
    entrypoint: ["/bin/sh", "-c", "export ARANGO_ROOT_PASSWORD=$(cat /run/keys/arango.pass) && exec /entrypoint.sh arangod"]
    volumes:
      - ./.data/arangodb:/var/lib/arangodb3
      - ./.data/arangodb-apps:/var/lib/arangodb3-apps
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "(command -v wget >/dev/null && wget -qO- http://127.0.0.1:8529/_admin/server/availability >/dev/null) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  sql:
    image: postgres:15
    container_name: sql
    restart: unless-stopped
    environment:
      PGPORT: 5432
      POSTGRES_USER: agience
      POSTGRES_PASSWORD_FILE: /run/keys/postgres.pass
      POSTGRES_DB: agience
    volumes:
      - ./.data/keys:/run/keys:ro
      - ./.data/postgresdb:/var/lib/postgresql/data
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d agience -U agience"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  search:
    image: opensearchproject/opensearch:latest
    container_name: search
    restart: unless-stopped
    environment:
      - cluster.name=agience-search
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_PERFORMANCE_ANALYZER_ENABLED=false
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - plugins.security.disabled=false
      - bootstrap.memory_lock=false
    entrypoint: ["/bin/sh", "-c", "export OPENSEARCH_INITIAL_ADMIN_PASSWORD=$(cat /run/keys/opensearch.pass) && exec /usr/share/opensearch/opensearch-docker-entrypoint.sh"]
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./.data/opensearch:/usr/share/opensearch/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL",
            "curl -sk -u \"admin:$(cat /run/keys/opensearch.pass)\" https://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  # ── Content storage (MinIO) ──────────────────────────────────────────

  content:
    image: minio/minio:latest
    container_name: content
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=agience
    entrypoint: ["/bin/sh", "-c", "export MINIO_ROOT_PASSWORD=$(cat /run/keys/minio.pass) && exec /usr/bin/docker-entrypoint.sh server /data --console-address :9001"]
    volumes:
      - ./.data/minio:/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Platform services ────────────────────────────────────────────────

  backend:
    image: ${REGISTRY:-agience}/agience-backend:${VERSION:-latest}
    pull_policy: always
    container_name: backend
    restart: unless-stopped
    environment:
      - BUILD_INFO_PATH=/app/build_info.json
      - POSTGRES_DB_HOST=sql
      - ARANGO_HOST=graph
      - OPENSEARCH_HOST=search
      - AGIENCE_SERVER_HOST_URI=http://servers:8082
      - MINIO_ROOT_USER=agience
      - KEYS_DIR=/app/.data/keys
      - CONTENT_URI=http://localhost:8080/content
    volumes:
      - ./.data/keys:/app/.data/keys:ro
    depends_on:
      content:
        condition: service_healthy
      sql:
        condition: service_healthy
      graph:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/version', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  servers:
    image: ${REGISTRY:-agience}/agience-servers:${VERSION:-latest}
    pull_policy: always
    container_name: servers
    restart: unless-stopped
    environment:
      - AGIENCE_API_URI=http://backend:8081
      - SRS_HTTP_API=http://stream:1985
      - STREAM_BASE_URL=http://stream:1985/live
      - STREAM_INGEST_URL=rtmp://localhost:1936/live
    volumes:
      - ./.data/stream:/var/stream
    depends_on:
      backend: { condition: service_healthy }

  stream:
    image: ${REGISTRY:-agience}/agience-stream:${VERSION:-latest}
    pull_policy: always
    container_name: stream
    restart: unless-stopped
    environment:
      - BACKEND_URI=http://servers:8082/astra
    volumes:
      - ./.data/stream:/var/stream
    ports:
      - "1936:1936"

  frontend:
    image: ${REGISTRY:-agience}/agience-frontend:${VERSION:-latest}
    pull_policy: always
    container_name: frontend
    restart: unless-stopped

  # ── Router — plain Caddy, HTTP only, no domain required ──────────────
  # Serves on http://localhost:8080.
  # No TLS cert, no agience-home image needed.

  caddy:
    image: caddy:alpine
    pull_policy: always
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8080:8080"
    configs:
      - source: caddy_config
        target: /etc/caddy/Caddyfile
    depends_on:
      init:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_started
      content:
        condition: service_started
      stream:
        condition: service_started

configs:
  caddy_config:
    content: |
      :8080 {
        handle /auth/* { reverse_proxy backend:8081 }
        handle /artifacts/* { reverse_proxy backend:8081 }
        handle /agents/* { reverse_proxy backend:8081 }
        handle /events* { reverse_proxy backend:8081 }
        handle /grants/* { reverse_proxy backend:8081 }
        handle /api-keys/* { reverse_proxy backend:8081 }
        handle /secrets/* { reverse_proxy backend:8081 }
        handle /types/* { reverse_proxy backend:8081 }
        handle /mcp* { reverse_proxy backend:8081 }
        handle /platform/* { reverse_proxy backend:8081 }
        handle /setup/* { reverse_proxy backend:8081 }
        handle /relay/* { reverse_proxy backend:8081 }
        handle /server-credentials/* { reverse_proxy backend:8081 }
        handle /gate/* { reverse_proxy backend:8081 }
        handle /passkey/* { reverse_proxy backend:8081 }
        handle /otp/* { reverse_proxy backend:8081 }
        handle /inbound/* { reverse_proxy backend:8081 }
        handle /.well-known/* { reverse_proxy backend:8081 }
        handle /version { reverse_proxy backend:8081 }
        handle /content/* {
          uri strip_prefix /content
          reverse_proxy content:9000
        }
        handle {
          reverse_proxy frontend:80
        }
      }
