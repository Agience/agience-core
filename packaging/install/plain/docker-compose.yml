# Agience Local — stable build, no domain, no TLS
#
# Self-contained — no .env file, no external config required.
# The init container generates all credentials on first boot.
# Runs on http://localhost:8080 — no domain or certificate needed.
#
# Set REGISTRY in environment to override the Docker Hub namespace (default: agience).
#
# Install:   irm https://raw.githubusercontent.com/Agience/agience-core/main/packaging/install/plain/install.ps1 | iex
#            curl -fsSL https://raw.githubusercontent.com/Agience/agience-core/main/packaging/install/plain/install.sh | sh
# Start:     docker compose up -d
# Open:      http://localhost:8080

services:

  # ── Init — generates all key material on first boot ──────────────────
  # Idempotent: skips if .data/.initialized exists.

  init:
    image: ${REGISTRY:-agience}/agience-init:${VERSION:-stable}
    container_name: init
    volumes:
      - ./.data:/data

  # ── Data layer ───────────────────────────────────────────────────────

  graph:
    image: arangodb:3.11
    container_name: graph
    restart: unless-stopped
    environment:
      - ARANGO_NO_AUTH=0
    entrypoint: ["/bin/sh", "-c", "export ARANGO_ROOT_PASSWORD=$(cat /run/keys/arango.pass) && exec /entrypoint.sh arangod"]
    volumes:
      - ./.data/arangodb:/var/lib/arangodb3
      - ./.data/arangodb-apps:/var/lib/arangodb3-apps
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully

  sql:
    image: postgres:15
    container_name: sql
    restart: unless-stopped
    environment:
      PGPORT: 5432
      POSTGRES_USER: agience
      POSTGRES_PASSWORD_FILE: /run/keys/postgres.pass
      POSTGRES_DB: agience
    volumes:
      - ./.data/keys:/run/keys:ro
      - ./.data/postgresdb:/var/lib/postgresql/data
    depends_on:
      init:
        condition: service_completed_successfully

  search:
    image: opensearchproject/opensearch:2.19.5
    container_name: search
    restart: unless-stopped
    environment:
      - cluster.name=agience-search
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_PERFORMANCE_ANALYZER_ENABLED=false
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - plugins.security.disabled=false
      - bootstrap.memory_lock=false
    entrypoint: ["/bin/sh", "-c", "export OPENSEARCH_INITIAL_ADMIN_PASSWORD=$(cat /run/keys/opensearch.pass) && exec /usr/share/opensearch/opensearch-docker-entrypoint.sh"]
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./.data/opensearch:/usr/share/opensearch/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully

  # ── Content storage (MinIO) ──────────────────────────────────────────

  content:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: content
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=agience
    entrypoint: ["/bin/sh", "-c", "export MINIO_ROOT_PASSWORD=$(cat /run/keys/minio.pass) && exec /usr/bin/docker-entrypoint.sh server /data --console-address :9001"]
    volumes:
      - ./.data/minio:/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully

  # ── Platform services ────────────────────────────────────────────────

  backend:
    image: ${REGISTRY:-agience}/agience-backend:${VERSION:-stable}
    pull_policy: always
    container_name: backend
    restart: unless-stopped
    environment:
      - BUILD_INFO_PATH=/app/build_info.json
      - POSTGRES_DB_HOST=sql
      - ARANGO_HOST=graph
      - OPENSEARCH_HOST=search
      - AGIENCE_SERVER_HOST_URI=http://servers:8082
      - MINIO_ROOT_USER=agience
      - KEYS_DIR=/app/.data/keys
      - FRONTEND_URI=http://localhost:8080
      - BACKEND_URI=http://localhost:8080/api
      - AWS_ENDPOINT_URL=http://content:9000
      - AWS_ENDPOINT_URL_PUBLIC=http://localhost:8080/content
    volumes:
      - ./.data/keys:/app/.data/keys:ro
    depends_on:
      content:
        condition: service_started
      sql:
        condition: service_started
      graph:
        condition: service_started
      search:
        condition: service_started

  servers:
    image: ${REGISTRY:-agience}/agience-servers:${VERSION:-stable}
    pull_policy: always
    container_name: servers
    restart: unless-stopped
    environment:
      - AGIENCE_API_URI=http://backend:8081
      - SRS_HTTP_API=http://stream:1985
      - STREAM_BASE_URL=http://stream:1985/live
      - STREAM_INGEST_URL=rtmp://localhost:1936/live
    volumes:
      - ./.data/stream:/var/stream
      - ./.data/keys:/run/secrets/keys:ro
    depends_on:
      backend:
        condition: service_started

  stream:
    image: ${REGISTRY:-agience}/agience-stream:${VERSION:-stable}
    pull_policy: always
    container_name: stream
    restart: unless-stopped
    environment:
      - BACKEND_URI=http://servers:8082/astra
    volumes:
      - ./.data/stream:/var/stream
    ports:
      - "1936:1936"

  frontend:
    image: ${REGISTRY:-agience}/agience-frontend:${VERSION:-stable}
    pull_policy: always
    container_name: frontend
    restart: unless-stopped
    environment:
      - VITE_BACKEND_URI=http://localhost:8080/api

  # ── Router — plain Caddy, HTTP only, no domain required ──────────────
  # Serves on http://localhost:8080.  

  caddy:
    image: caddy:2.11.2-alpine
    pull_policy: always
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8080:8080"
    configs:
      - source: caddy_config
        target: /etc/caddy/Caddyfile
    depends_on:
      init:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_started
      content:
        condition: service_started
      stream:
        condition: service_started

configs:
  caddy_config:
    content: |
      :8080 {
        handle_path /api/* {
          reverse_proxy backend:8081 {
            flush_interval -1
          }
        }
        @mcp path /mcp /mcp/*
        handle @mcp {
          reverse_proxy backend:8081 {
            flush_interval -1
          }
        }
        handle /.well-known/* {
          reverse_proxy backend:8081
        }
        handle_path /content/* {
          reverse_proxy content:9000
        }
        handle {
          reverse_proxy frontend:80
        }
      }
