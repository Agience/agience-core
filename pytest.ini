[pytest]
# Phase G.3 — services moved under src/. Each service is also runnable as
# its own package root (cwd-style), so we put the service dirs on the path
# in addition to src/. This lets package-prefixed imports
# (`from mantle.X import Y`, `from origin.X import Y`, `from kernel.X import Y`)
# and bare imports inside a service
# (`from entities.X import Y`, `from services.X`, `from search.X import Y`)
# both resolve.
pythonpath = src src/mantle
# importlib mode keeps each `tests/` package name distinct by file path,
# avoiding the "import file mismatch" collision when 8 personas each have
# their own `tests/__init__.py`.
addopts = --import-mode=importlib
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
