<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Host Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px; color: #1e293b; background: #fff; line-height: 1.5;
  }
  .container { padding: 20px; max-width: 600px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #0f172a; }
  .badge {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 9999px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-integrated { background: #ede9fe; color: #6d28d9; }
  .badge-desktop { background: #dbeafe; color: #1d4ed8; }
  .badge-browser { background: #cffafe; color: #0e7490; }
  .badge-android { background: #dcfce7; color: #15803d; }
  .badge-rpi { background: #ffedd5; color: #c2410c; }
  .badge-server { background: #f1f5f9; color: #475569; }
  .badge-unknown { background: #f1f5f9; color: #64748b; }
  .field-group { margin-bottom: 16px; }
  .field-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    color: #94a3b8; margin-bottom: 4px;
  }
  .field-value {
    font-size: 14px; color: #1e293b; padding: 8px 12px;
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    word-break: break-all;
  }
  .field-value.empty { color: #cbd5e1; font-style: italic; }
  .server-list {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px;
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
  }
  .server-tag {
    font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 9999px;
    background: #ede9fe; color: #6d28d9;
  }
  .toggle-bar {
    display: flex; align-items: center; justify-content: flex-end;
    margin-bottom: 16px;
  }
  .toggle-btn {
    font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 6px;
    border: 1px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-btn:hover { background: #f1f5f9; color: #334155; }
  input.edit-input {
    width: 100%; font-size: 14px; padding: 8px 12px;
    border: 1px solid #c7d2fe; border-radius: 8px; outline: none;
    transition: border-color 0.15s;
  }
  input.edit-input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
  .save-bar { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn {
    font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: 8px;
    border: none; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
  .btn-secondary:hover { background: #e2e8f0; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
    background: #10b981; color: #fff; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container" id="app">
  <div style="color:#94a3b8;text-align:center;padding:40px 0;">Loading...</div>
</div>
<div class="toast" id="toast">Saved</div>

<script>
/* --- MCP Apps JSON-RPC boilerplate --- */
let _rpcId = 0;
const _pending = {};
function sendRpc(method, params) {
  const id = ++_rpcId;
  return new Promise((resolve, reject) => {
    _pending[id] = { resolve, reject };
    parent.postMessage({ jsonrpc: '2.0', id, method, params }, '*');
  });
}
function sendNotification(method, params) {
  parent.postMessage({ jsonrpc: '2.0', method, params }, '*');
}
let _artifactData = null;
let _hostCtx = {};
function handleHostContext(ctx) { _hostCtx = { ..._hostCtx, ...ctx }; }
function handleToolResult(params) {
  const text = (params.content || []).find(c => c.type === 'text');
  if (text) { _artifactData = JSON.parse(text.text); render(); }
}
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || d.jsonrpc !== '2.0') return;
  if (d.id && _pending[d.id]) {
    if (d.error) _pending[d.id].reject(d.error);
    else _pending[d.id].resolve(d.result);
    delete _pending[d.id]; return;
  }
  if (d.method === 'ui/notifications/tool-result') handleToolResult(d.params);
  if (d.method === 'ui/notifications/host-context-changed') handleHostContext(d.params);
});
sendRpc('ui/initialize', {
  protocolVersion: '2026-01-26',
  clientInfo: { name: 'agience-viewer', version: '0.1.0' }
}).then(result => {
  if (result.hostContext) handleHostContext(result.hostContext);
  sendNotification('ui/notifications/initialized');
});
async function updateArtifact(patch) {
  return sendRpc('tools/call', { name: 'update_artifact', arguments: { id: _artifactData.artifact_id, patch } });
}

/* --- Host viewer state --- */
let _editing = false;
let _saving = false;
let _draft = {};

function ctx() {
  if (!_artifactData) return {};
  try {
    return typeof _artifactData.context === 'string'
      ? JSON.parse(_artifactData.context)
      : (_artifactData.context || {});
  } catch { return {}; }
}

function badgeClass(platform) {
  const map = {
    integrated: 'badge-integrated',
    desktop: 'badge-desktop',
    browser: 'badge-browser',
    android: 'badge-android',
    rpi: 'badge-rpi',
    server: 'badge-server',
  };
  return map[platform] || 'badge-unknown';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleEdit() {
  if (!_editing) {
    const c = ctx();
    _draft = {
      title: c.title || '',
      relay_url: c.relay_url || '',
    };
  }
  _editing = !_editing;
  render();
}

async function save() {
  _saving = true;
  render();
  try {
    const c = ctx();
    const newCtx = { ...c, ..._draft };
    await updateArtifact({
      context: JSON.stringify(newCtx),
      description: _draft.title || _artifactData.description || '',
    });
    _editing = false;
    showToast('Saved');
  } catch (err) {
    showToast('Save failed');
    console.error(err);
  } finally {
    _saving = false;
    render();
  }
}

function render() {
  if (!_artifactData) return;
  const c = ctx();
  const app = document.getElementById('app');
  const platform = c.platform || 'unknown';
  const servers = Array.isArray(c.servers) ? c.servers : [];
  const isIntegrated = platform === 'integrated';

  if (_editing) {
    app.innerHTML = `
      <div class="header">
        <h1>Host</h1>
        <span class="badge ${badgeClass(platform)}">${esc(platform)}</span>
      </div>
      <div class="toggle-bar">
        <button class="toggle-btn" onclick="toggleEdit()">Cancel</button>
      </div>
      <div class="field-group">
        <div class="field-label">Title</div>
        <input class="edit-input" id="f-title" value="${esc(_draft.title)}" />
      </div>
      ${!isIntegrated ? `
      <div class="field-group">
        <div class="field-label">Relay URL</div>
        <input class="edit-input" id="f-relay" value="${esc(_draft.relay_url)}" placeholder="wss://relay.example.com/..." />
      </div>` : ''}
      <div class="save-bar">
        <button class="btn btn-secondary" onclick="toggleEdit()">Cancel</button>
        <button class="btn btn-primary" id="save-btn" onclick="save()" ${_saving ? 'disabled' : ''}>${_saving ? 'Saving...' : 'Save'}</button>
      </div>
    `;
    const titleEl = document.getElementById('f-title');
    if (titleEl) titleEl.addEventListener('input', e => { _draft.title = e.target.value; });
    const relayEl = document.getElementById('f-relay');
    if (relayEl) relayEl.addEventListener('input', e => { _draft.relay_url = e.target.value; });
  } else {
    app.innerHTML = `
      <div class="header">
        <h1>${esc(c.title || _artifactData.description || 'Untitled Host')}</h1>
        <span class="badge ${badgeClass(platform)}">${esc(platform)}</span>
      </div>
      <div class="toggle-bar">
        <button class="toggle-btn" onclick="toggleEdit()">Edit</button>
      </div>
      <div class="field-group">
        <div class="field-label">Platform</div>
        <div class="field-value">${esc(platform)}</div>
      </div>
      ${servers.length ? `
      <div class="field-group">
        <div class="field-label">Servers</div>
        <div class="server-list">
          ${servers.map(s => `<span class="server-tag">${esc(s)}</span>`).join('')}
        </div>
      </div>` : ''}
      ${!isIntegrated ? `
      <div class="field-group">
        <div class="field-label">Relay URL</div>
        <div class="field-value ${c.relay_url ? '' : 'empty'}">${esc(c.relay_url || 'Not configured')}</div>
      </div>` : ''}
    `;
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}
</script>
</body>
</html>

<body>
<div class="container" id="app">
  <div style="color:#94a3b8;text-align:center;padding:40px 0;">Loading...</div>
</div>
<div class="toast" id="toast">Saved</div>

<script>
/* --- MCP Apps JSON-RPC boilerplate --- */
let _rpcId = 0;
const _pending = {};
function sendRpc(method, params) {
  const id = ++_rpcId;
  return new Promise((resolve, reject) => {
    _pending[id] = { resolve, reject };
    parent.postMessage({ jsonrpc: '2.0', id, method, params }, '*');
  });
}
function sendNotification(method, params) {
  parent.postMessage({ jsonrpc: '2.0', method, params }, '*');
}
let _artifactData = null;
let _hostCtx = {};
function handleHostContext(ctx) { _hostCtx = { ..._hostCtx, ...ctx }; }
function handleToolResult(params) {
  const text = (params.content || []).find(c => c.type === 'text');
  if (text) { _artifactData = JSON.parse(text.text); render(); }
}
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || d.jsonrpc !== '2.0') return;
  if (d.id && _pending[d.id]) {
    if (d.error) _pending[d.id].reject(d.error);
    else _pending[d.id].resolve(d.result);
    delete _pending[d.id]; return;
  }
  if (d.method === 'ui/notifications/tool-result') handleToolResult(d.params);
  if (d.method === 'ui/notifications/host-context-changed') handleHostContext(d.params);
});
sendRpc('ui/initialize', {
  protocolVersion: '2026-01-26',
  clientInfo: { name: 'agience-viewer', version: '0.1.0' }
}).then(result => {
  if (result.hostContext) handleHostContext(result.hostContext);
  sendNotification('ui/notifications/initialized');
});
async function updateArtifact(patch) {
  return sendRpc('tools/call', { name: 'update_artifact', arguments: { id: _artifactData.artifact_id, patch } });
}

/* --- Relay status --- */
let _relayStatus = null;   // null = loading, false = disconnected, {session} = connected

async function fetchRelayStatus() {
  try {
    const result = await sendRpc('tools/call', { name: 'relay_status', arguments: {} });
    const text = (result.content || []).find(c => c.type === 'text');
    if (text) {
      const data = JSON.parse(text.text);
      _relayStatus = data.connected ? data.session : false;
    }
  } catch {
    _relayStatus = false;
  }
  renderRelayStatus();
}

function renderRelayStatus() {
  const el = document.getElementById('relay-status-area');
  if (!el) return;
  if (_relayStatus === null) {
    el.innerHTML = '<div class="relay-status-row"><span class="relay-status-label">Desktop Relay</span><span class="relay-disconnected">Checking...</span></div>';
    return;
  }
  if (_relayStatus === false) {
    el.innerHTML = '<div class="relay-status-row"><span class="relay-status-label">Desktop Relay</span><span class="relay-disconnected">Not connected</span></div>';
    return;
  }
  const name = _relayStatus.display_name || _relayStatus.device_id || 'Connected device';
  const lastSeen = _relayStatus.last_seen_at ? new Date(_relayStatus.last_seen_at).toLocaleTimeString() : '';
  el.innerHTML = `<div class="relay-status-row">
    <span class="relay-status-label">Desktop Relay &mdash; ${esc(name)}</span>
    <span class="relay-connected">&#10003; Connected${lastSeen ? ' &middot; ' + lastSeen : ''}</span>
  </div>`;
}

/* --- OS detection --- */
function detectOS() {
  const ua = navigator.userAgent.toLowerCase();
  if (ua.includes('win')) return 'windows';
  if (ua.includes('mac')) return 'macos';
  return 'linux';
}

const _osLabels = { windows: 'Windows (.exe)', macos: 'macOS (.dmg)', linux: 'Linux (.AppImage)' };
const _osOther  = { windows: ['macos', 'linux'], macos: ['windows', 'linux'], linux: ['windows', 'macos'] };

function downloadUrl(platform) {
  const base = (ctx().host || {}).backend_uri || '';
  return `${base}/relay/download?platform=${platform}`;
}

/* --- Host viewer state --- */
let _editing = false;
let _saving = false;
let _draft = {};

function ctx() {
  if (!_artifactData) return {};
  try {
    return typeof _artifactData.context === 'string'
      ? JSON.parse(_artifactData.context)
      : (_artifactData.context || {});
  } catch { return {}; }
}

function host() { return ctx().host || {}; }
function install() { return host().install || {}; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleEdit() {
  if (!_editing) {
    const h = host();
    _draft = {
      title: ctx().title || '',
      scope: h.scope || '',
      operator: h.operator || '',
      frontend_uri: h.frontend_uri || '',
      backend_uri: h.backend_uri || '',
    };
  }
  _editing = !_editing;
  render();
}

async function save() {
  _saving = true;
  render();
  try {
    const c = ctx();
    const h = host();
    const newCtx = {
      ...c,
      title: _draft.title,
      host: {
        ...h,
        scope: _draft.scope,
        operator: _draft.operator,
        frontend_uri: _draft.frontend_uri,
        backend_uri: _draft.backend_uri,
      },
    };
    await updateArtifact({
      context: JSON.stringify(newCtx),
      description: _draft.title || _artifactData.description || '',
    });
    _editing = false;
    showToast('Saved');
  } catch (err) {
    showToast('Save failed');
    console.error(err);
  } finally {
    _saving = false;
    render();
  }
}

function render() {
  if (!_artifactData) return;
  const c = ctx();
  const h = host();
  const inst = install();
  const app = document.getElementById('app');

  if (_editing) {
    app.innerHTML = `
      <div class="header">
        <h1>Host</h1>
        <span class="badge"><span class="dot"></span>Editing</span>
      </div>
      <div class="toggle-bar">
        <button class="toggle-btn" onclick="toggleEdit()">Cancel</button>
      </div>
      <div class="field-group">
        <div class="field-label">Title</div>
        <input class="edit-input" id="f-title" value="${esc(_draft.title)}" />
      </div>
      <div class="field-group">
        <div class="field-label">Scope</div>
        <input class="edit-input" id="f-scope" value="${esc(_draft.scope)}" />
      </div>
      <div class="field-group">
        <div class="field-label">Operator</div>
        <input class="edit-input" id="f-operator" value="${esc(_draft.operator)}" />
      </div>
      <div class="uri-row">
        <div class="field-group">
          <div class="field-label">Frontend URI</div>
          <input class="edit-input" id="f-frontend" value="${esc(_draft.frontend_uri)}" />
        </div>
        <div class="field-group">
          <div class="field-label">Backend URI</div>
          <input class="edit-input" id="f-backend" value="${esc(_draft.backend_uri)}" />
        </div>
      </div>
      <div class="save-bar">
        <button class="btn btn-secondary" onclick="toggleEdit()">Cancel</button>
        <button class="btn btn-primary" id="save-btn" onclick="save()" ${_saving ? 'disabled' : ''}>${_saving ? 'Saving...' : 'Save'}</button>
      </div>
    `;
    ['title','scope','operator'].forEach(k => {
      const el = document.getElementById('f-' + k);
      if (el) el.addEventListener('input', e => { _draft[k] = e.target.value; });
    });
    const fe = document.getElementById('f-frontend');
    if (fe) fe.addEventListener('input', e => { _draft.frontend_uri = e.target.value; });
    const be = document.getElementById('f-backend');
    if (be) be.addEventListener('input', e => { _draft.backend_uri = e.target.value; });
    return;
  }

  const os = detectOS();
  const showRelay = !!inst.desktop_relay;

  app.innerHTML = `
    <div class="header">
      <h1>${esc(c.title || _artifactData.description || 'Untitled Host')}</h1>
      <span class="badge"><span class="dot"></span>Host</span>
    </div>
    <div class="toggle-bar">
      <button class="toggle-btn" onclick="toggleEdit()">Edit</button>
    </div>
    <div class="field-group">
      <div class="field-label">Scope</div>
      <div class="field-value ${h.scope ? '' : 'empty'}">${esc(h.scope || 'Not set')}</div>
    </div>
    <div class="field-group">
      <div class="field-label">Operator</div>
      <div class="field-value ${h.operator ? '' : 'empty'}">${esc(h.operator || 'Not set')}</div>
    </div>
    <div class="uri-row">
      <div class="field-group">
        <div class="field-label">Frontend URI</div>
        <div class="field-value ${h.frontend_uri ? '' : 'empty'}">${esc(h.frontend_uri || 'Not set')}</div>
      </div>
      <div class="field-group">
        <div class="field-label">Backend URI</div>
        <div class="field-value ${h.backend_uri ? '' : 'empty'}">${esc(h.backend_uri || 'Not set')}</div>
      </div>
    </div>
    ${showRelay ? `
    <hr class="section-divider" />
    <div class="section-title">Desktop Relay</div>
    <div id="relay-status-area">
      <div class="relay-status-row">
        <span class="relay-status-label">Desktop Relay</span>
        <span class="relay-disconnected">Checking...</span>
      </div>
    </div>
    <div class="field-label" style="margin-bottom:8px;">Install</div>
    <div class="download-grid">
      <a href="${esc(downloadUrl(os))}" class="download-btn-primary" target="_blank">
        Download for ${esc(_osLabels[os])}
      </a>
      ${_osOther[os].map(p => `<a href="${esc(downloadUrl(p))}" class="download-btn-other" target="_blank">${esc(_osLabels[p])}</a>`).join('')}
    </div>
    ` : ''}
  `;

  if (showRelay) {
    renderRelayStatus();
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

/* --- Boot: fetch relay status after initial render --- */
const _origHandleToolResult = handleToolResult;
window.__hostReady = function() {
  fetchRelayStatus();
  setInterval(fetchRelayStatus, 30000);
};
// Trigger relay status once artifact is loaded
const _origRender = render;
render = function() {
  _origRender();
  if (_artifactData && !render._booted) {
    render._booted = true;
    fetchRelayStatus();
    setInterval(fetchRelayStatus, 30000);
  }
};
</script>
</body>
</html>
