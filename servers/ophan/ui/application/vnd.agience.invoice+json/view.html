<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; color: #1e293b; background: #fff; line-height: 1.5; }
  .container { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .header { display: flex; align-items: center; gap: 8px; }
  .icon { flex-shrink: 0; color: #6366f1; }
  .title { font-size: 14px; font-weight: 600; color: #111827; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 9999px; }
  .badge-draft { background: #f3f4f6; color: #4b5563; }
  .badge-sent { background: #dbeafe; color: #1e40af; }
  .badge-paid { background: #d1fae5; color: #065f46; }
  .badge-void { background: #fee2e2; color: #991b1b; }
  .party-row { display: flex; gap: 16px; font-size: 12px; color: #6b7280; }
  .party-val { color: #374151; }
  .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: #9ca3af; font-weight: 500; padding-bottom: 4px; border-bottom: 1px solid #f3f4f6; }
  th.right, td.right { text-align: right; }
  tr { border-bottom: 1px solid #f9fafb; }
  tr:last-child { border-bottom: none; }
  td { padding: 4px 0; color: #374151; }
  td.mono { font-family: 'SF Mono','Fira Code',monospace; }
  .total-box { display: flex; align-items: baseline; justify-content: space-between; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 10px; padding: 8px 14px; }
  .total-label { font-size: 13px; color: #4b5563; }
  .total-val { font-family: 'SF Mono','Fira Code',monospace; font-size: 18px; font-weight: 700; color: #3730a3; }
  .meta { font-size: 12px; color: #9ca3af; }
  .empty { font-size: 13px; color: #9ca3af; font-style: italic; padding: 24px 0; text-align: center; }
</style>
</head>
<body>
<div class="container" id="app"><div class="empty">Loading…</div></div>
<script>
let _nextId = 1; const _pending = {};
function sendRpc(m, p) { return new Promise((res, rej) => { const id = _nextId++; _pending[id] = {resolve:res, reject:rej}; window.parent.postMessage({jsonrpc:'2.0',id,method:m,params:p},'*'); }); }
function sendNotification(m, p) { window.parent.postMessage({jsonrpc:'2.0',method:m,params:p},'*'); }
window.addEventListener('message', e => {
  if (!e.data || e.data.jsonrpc !== '2.0') return;
  if (typeof e.data.id === 'number' && _pending[e.data.id]) { const {resolve,reject} = _pending[e.data.id]; delete _pending[e.data.id]; e.data.error ? reject(new Error(e.data.error.message)) : resolve(e.data.result); }
  if (e.data.method === 'ui/notifications/tool-result') handleToolResult(e.data.params);
});
let _artifact = null;
sendRpc('ui/initialize', {}).then(() => sendNotification('ui/notifications/initialized', {}));
function handleToolResult(p) { try { const d = JSON.parse(p?.content?.[0]?.text); if (d?.artifact_id) { _artifact = d; render(); } } catch {} }
function ctx() { if (!_artifact) return {}; try { return typeof _artifact.context === 'string' ? JSON.parse(_artifact.context) : (_artifact.context || {}); } catch { return {}; } }
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function render() {
  const app = document.getElementById('app'); if (!_artifact) return;
  const c = ctx();
  const status = c.status || 'draft';
  const items = Array.isArray(c.line_items) ? c.line_items : [];
  const badgeCls = {draft:'badge-draft',sent:'badge-sent',paid:'badge-paid',void:'badge-void'}[status] || 'badge-draft';

  app.innerHTML = `
    <div class="header">
      <svg class="icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="title">${esc(c.invoice_number || c.title || 'Invoice')}</span>
      <span class="badge ${badgeCls}">${esc(status)}</span>
    </div>
    ${(c.issuer || c.recipient) ? `
      <div class="party-row">
        ${c.issuer ? `<span>From <span class="party-val">${esc(c.issuer)}</span></span>` : ''}
        ${c.recipient ? `<span>To <span class="party-val">${esc(c.recipient)}</span></span>` : ''}
      </div>` : ''}
    ${items.length > 0 ? `
      <div>
        <div class="section-label">Line Items</div>
        <table>
          <thead><tr><th>Item</th><th class="right">Qty</th><th class="right">Amount</th></tr></thead>
          <tbody>
            ${items.map(item => `
              <tr>
                <td>${esc(item.description || '')}</td>
                <td class="right">${esc(item.quantity ?? '')}</td>
                <td class="right mono">${esc(item.amount ?? '')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}
    ${c.total ? `
      <div class="total-box">
        <span class="total-label">Total</span>
        <span class="total-val">${esc(c.total)} ${esc(c.currency || '')}</span>
      </div>` : ''}
    ${c.due_date ? `<div class="meta">Due ${new Date(c.due_date).toLocaleDateString()}</div>` : ''}
  `;
}
</script>
</body>
</html>
