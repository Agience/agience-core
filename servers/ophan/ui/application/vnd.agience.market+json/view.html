<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Market Data</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; color: #1e293b; background: #fff; line-height: 1.5; }
  .container { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .header { display: flex; align-items: center; gap: 8px; }
  .icon-up { color: #10b981; } .icon-down { color: #ef4444; }
  .symbol { font-size: 14px; font-weight: 600; font-family: 'SF Mono','Fira Code',monospace; color: #111827; flex: 1; }
  .interval-badge { font-size: 11px; background: #f3f4f6; color: #4b5563; font-family: 'SF Mono','Fira Code',monospace; padding: 2px 6px; border-radius: 4px; }
  .source-label { font-size: 12px; color: #9ca3af; margin-left: auto; }
  .ohlcv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 10px; padding: 10px 12px; }
  .ohlcv-cell { display: flex; flex-direction: column; }
  .ohlcv-k { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #6b7280; }
  .ohlcv-v { font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; font-weight: 600; color: #374151; }
  .ohlcv-v.up { color: #065f46; } .ohlcv-v.down { color: #991b1b; }
  .meta { font-size: 12px; color: #9ca3af; display: flex; flex-direction: column; gap: 2px; }
  .empty { font-size: 13px; color: #9ca3af; font-style: italic; padding: 24px 0; text-align: center; }
</style>
</head>
<body>
<div class="container" id="app"><div class="empty">Loading…</div></div>
<script>
let _nextId = 1; const _pending = {};
function sendRpc(m, p) { return new Promise((res, rej) => { const id = _nextId++; _pending[id] = {resolve:res, reject:rej}; window.parent.postMessage({jsonrpc:'2.0',id,method:m,params:p},'*'); }); }
function sendNotification(m, p) { window.parent.postMessage({jsonrpc:'2.0',method:m,params:p},'*'); }
window.addEventListener('message', e => {
  if (!e.data || e.data.jsonrpc !== '2.0') return;
  if (typeof e.data.id === 'number' && _pending[e.data.id]) { const {resolve,reject} = _pending[e.data.id]; delete _pending[e.data.id]; e.data.error ? reject(new Error(e.data.error.message)) : resolve(e.data.result); }
  if (e.data.method === 'ui/notifications/tool-result') handleToolResult(e.data.params);
});
let _artifact = null;
sendRpc('ui/initialize', {}).then(() => sendNotification('ui/notifications/initialized', {}));
function handleToolResult(p) { try { const d = JSON.parse(p?.content?.[0]?.text); if (d?.artifact_id) { _artifact = d; render(); } } catch {} }
function ctx() { if (!_artifact) return {}; try { return typeof _artifact.context === 'string' ? JSON.parse(_artifact.context) : (_artifact.context || {}); } catch { return {}; } }
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function render() {
  const app = document.getElementById('app'); if (!_artifact) return;
  const c = ctx();
  const candles = Array.isArray(c.candles) ? c.candles : [];
  const last = candles[candles.length - 1];
  const first = candles[0];
  const isUp = last && first ? parseFloat(last.c) >= parseFloat(first.o) : true;

  const upSvg = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="icon-up"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`;
  const downSvg = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="icon-down"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`;

  app.innerHTML = `
    <div class="header">
      ${isUp ? upSvg : downSvg}
      <span class="symbol">${esc(c.symbol || c.title || 'Market Data')}</span>
      ${c.interval ? `<span class="interval-badge">${esc(c.interval)}</span>` : ''}
      ${c.source ? `<span class="source-label">${esc(c.source)}</span>` : ''}
    </div>
    ${last ? `
      <div class="ohlcv-grid">
        ${['o','h','l','c'].map(k => `
          <div class="ohlcv-cell">
            <span class="ohlcv-k">${k}</span>
            <span class="ohlcv-v${k === 'c' ? (isUp ? ' up' : ' down') : ''}">${esc(last[k] ?? '—')}</span>
          </div>`).join('')}
      </div>` : ''}
    <div class="meta">
      <span>${candles.length} candle${candles.length !== 1 ? 's' : ''}</span>
      ${c.from && c.to ? `<span>${new Date(c.from).toLocaleDateString()} – ${new Date(c.to).toLocaleDateString()}</span>` : ''}
    </div>
  `;
}
</script>
</body>
</html>
