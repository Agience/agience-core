<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stream Source Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px; color: #1e293b; background: #fff; line-height: 1.5;
  }
  .container { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .header { display: flex; align-items: center; gap: 8px; }
  .header-icon { flex-shrink: 0; width: 16px; height: 16px; }
  .header-icon.live { color: #ef4444; }
  .header-icon.idle { color: #94a3b8; }
  .header-title { font-size: 15px; font-weight: 600; color: #0f172a; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px; margin-left: auto;
    font-size: 12px; font-weight: 500; color: #dc2626;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .idle-label { margin-left: auto; font-size: 12px; font-weight: 500; color: #94a3b8; }

  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    border-radius: 8px; border: 1px solid; padding: 10px 14px;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    background: transparent;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-live { border-color: #fecaca; background: #fef2f2; color: #b91c1c; }
  .btn-live:not(:disabled):hover { background: #fee2e2; }
  .btn-blue { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; }
  .btn-blue:not(:disabled):hover { background: #dbeafe; }
  .btn-gray { border-color: #e2e8f0; background: #f8fafc; color: #94a3b8; }
  .btn-dashed {
    border-style: dashed; border-color: #cbd5e1; background: transparent;
    color: #64748b; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn-dashed:not(:disabled):hover { border-color: #94a3b8; color: #1e293b; background: #f8fafc; }
  .btn-dashed:disabled { opacity: 0.5; cursor: not-allowed; }

  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 4px;
  }
  .field-row {
    display: flex; align-items: center; gap: 8px;
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px;
  }
  .field-code { flex: 1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #475569; word-break: break-all; }
  .field-code.masked { color: #cbd5e1; letter-spacing: 0.05em; }
  .icon-btn {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    padding: 4px; border-radius: 4px; color: #94a3b8; transition: all 0.15s; display: flex;
  }
  .icon-btn:hover { background: #e2e8f0; color: #1e293b; }
  .icon-btn.green { color: #16a34a; }

  .warn-box {
    display: flex; align-items: flex-start; gap: 8px;
    background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; padding: 8px 12px;
    font-size: 12px; color: #92400e;
  }
  .warn-box.amber { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
  .warn-box.red { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }

  .text-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; color: #64748b; background: none; border: none; cursor: pointer; padding: 0;
    transition: color 0.15s;
  }
  .text-link:not(:disabled):hover { color: #1e293b; }
  .text-link:disabled { opacity: 0.5; cursor: not-allowed; }

  .meta-row { display: flex; flex-wrap: wrap; gap: 16px; font-size: 12px; color: #64748b; }
  .meta-row strong { color: #475569; font-weight: 500; }

  .sessions-list { display: flex; flex-direction: column; gap: 6px; }
  .session-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0;
    border-radius: 8px; font-size: 12px;
  }
  .session-id { font-family: 'SF Mono','Fira Code',monospace; color: #475569; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(40px);
    background: #0f172a; color: #fff; border-radius: 8px; padding: 8px 16px;
    font-size: 13px; opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  svg { display: inline-block; }
</style>
</head>
<body>
<div class="container" id="app">
  <div style="color:#94a3b8;font-size:13px;">Loading...</div>
</div>
<div class="toast" id="toast"></div>

<script>
/* MCP Apps postMessage protocol */
let _nextId = 1;
const _pending = {};

function sendRpc(method, params) {
  return new Promise((resolve, reject) => {
    const id = _nextId++;
    _pending[id] = { resolve, reject };
    window.parent.postMessage({ jsonrpc: '2.0', id, method, params }, '*');
  });
}

function sendNotification(method, params) {
  window.parent.postMessage({ jsonrpc: '2.0', method, params }, '*');
}

window.addEventListener('message', (e) => {
  if (!e.data || e.data.jsonrpc !== '2.0') return;
  if (typeof e.data.id === 'number' && _pending[e.data.id]) {
    const { resolve, reject } = _pending[e.data.id];
    delete _pending[e.data.id];
    if (e.data.error) reject(new Error(e.data.error.message));
    else resolve(e.data.result);
  }
  if (e.data.method === 'ui/notifications/tool-result') {
    handleToolResult(e.data.params);
  }
});

/* Tool helpers — all tool calls go to Astra (server: 'astra') or platform (default) */
function callTool(name, args, server) {
  const params = { name, arguments: args };
  if (server) params.server = server;
  return sendRpc('tools/call', params);
}

function updateArtifact(patch) {
  return sendRpc('tools/call', { name: 'update_artifact', arguments: { id: _artifactData.artifact_id, patch } });
}

/* Viewer state */
let _artifactData = null;
let _liveSession = null;
let _revealedKey = null;
let _copied = false;
let _rotating = false;
let _transcribing = false;
let _pollTimer = null;

function ctx() {
  if (!_artifactData) return {};
  try {
    return typeof _artifactData.context === 'string'
      ? JSON.parse(_artifactData.context)
      : (_artifactData.context || {});
  } catch { return {}; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* --- Initialize --- */
sendRpc('ui/initialize', {}).then(() => {
  sendNotification('ui/notifications/initialized', {});
});

function handleToolResult(params) {
  if (!params || !params.content) return;
  try {
    const text = params.content[0]?.text;
    const data = JSON.parse(text);
    if (data.artifact_id) {
      _artifactData = data;
      render();
      startPolling();
    }
  } catch {}
}

/* Live session polling (every 5 seconds) */
function startPolling() {
  if (_pollTimer) return;
  poll();
  _pollTimer = setInterval(poll, 5000);
}

async function poll() {
  if (!_artifactData) return;
  try {
    const result = await callTool('get_stream_sessions', { source_artifact_id: _artifactData.artifact_id }, 'astra');
    const text = result?.content?.[0]?.text;
    const data = JSON.parse(text || '{}');
    const sessions = Array.isArray(data.sessions) ? data.sessions : [];
    _liveSession = sessions[0] || null;
    render();
  } catch { _liveSession = null; render(); }
}

/* Key rotation */
async function handleGenerateOrRotate() {
  if (_rotating || !_artifactData) return;
  _rotating = true;
  render();
  try {
    const c = ctx();
    const result = await callTool('rotate_stream_key', {
      workspace_id: _artifactData.workspace_id,
      artifact_id: _artifactData.artifact_id,
    }, 'astra');
    const text = result?.content?.[0]?.text;
    const data = JSON.parse(text || '{}');
    if (!data.key) throw new Error(data.detail || 'Key rotation failed');
    _revealedKey = data.key;
    _copied = false;

    const stream = (c.stream || {});
    await updateArtifact({
      context: JSON.stringify({ ...c, stream: { ...stream, obs_api_key_id: data.key_id, server_url: data.server_url } }),
    });
  } catch (err) {
    showToast(err.message || 'Failed to generate key');
  } finally {
    _rotating = false;
    render();
  }
}

async function handleCopy() {
  if (!_revealedKey) return;
  try {
    await navigator.clipboard.writeText(_revealedKey);
    _copied = true;
    render();
    setTimeout(() => { _copied = false; render(); }, 2000);
  } catch {}
}

async function handleTranscribe() {
  if (_transcribing || !_artifactData) return;
  const c = ctx();
  const stream = c.stream || {};
  const sessions = stream.sessions || [];
  const latestSession = sessions[sessions.length - 1];
  if (!latestSession) { showToast('No session available to transcribe'); return; }
  if (_liveSession) { showToast('Wait for the stream to end before transcribing'); return; }
  _transcribing = true;
  render();
  try {
    const title = c.title ? `Transcript \u2014 ${c.title}` : undefined;
    const args = {
      workspace_id: _artifactData.workspace_id,
      artifact_id: latestSession,
      title,
    };
    if (stream.credential_artifact_id) {
      args.credential_artifact_id = stream.credential_artifact_id;
    }
    if (stream.language_code) {
      args.language_code = stream.language_code;
    }
    const result = await callTool('transcribe_artifact', args, 'verso');
    const text = result?.content?.[0]?.text;
    const data = JSON.parse(text || '{}');
    if (data.error) throw new Error(data.error);
    showToast('Transcript created');
  } catch (err) {
    showToast(err.message || 'Transcription failed');
  } finally {
    _transcribing = false;
    render();
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function icon(name, cls) {
  const icons = {
    radio: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M7.76 7.76a6 6 0 0 0 0 8.49"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/></svg>`,
    key: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg>`,
    refresh: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>`,
    copy: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
    check: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    warn: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    video: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`,
    text: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
  };
  return `<span class="${cls || ''}" style="display:inline-flex;">${icons[name] || ''}</span>`;
}

function render() {
  const app = document.getElementById('app');
  if (!_artifactData) return;

  const c = ctx();
  const stream = c.stream || {};
  const hasKeyStored = Boolean(stream.obs_api_key_id);
  const sessionIds = stream.sessions || [];
  const targetType = stream.target_content_type || 'video/mp4';
  const agents = stream.agents || [];
  const isLive = Boolean(_liveSession);
  const latestSession = sessionIds[sessionIds.length - 1] || null;

  const streamIngestUrl = stream.server_url || '';

  let keySection = '';
  if (!hasKeyStored && !_revealedKey) {
    keySection = `
      <button class="btn-dashed" onclick="handleGenerateOrRotate()" ${_rotating ? 'disabled' : ''}>
        ${icon('key')} ${_rotating ? 'Generating…' : 'Generate Stream Key'}
      </button>`;
  } else if (_revealedKey) {
    keySection = `
      <div class="field-row">
        <code class="field-code">${esc(_revealedKey)}</code>
        <button class="icon-btn ${_copied ? 'green' : ''}" onclick="handleCopy()" title="Copy key">
          ${_copied ? icon('check') : icon('copy')}
        </button>
      </div>
      <div class="warn-box amber">
        ${icon('warn')}
        <span><strong>Save this key now.</strong> It won't be shown again. Paste it into OBS as the stream key.</span>
      </div>
      <button class="text-link" onclick="handleGenerateOrRotate()" ${_rotating ? 'disabled' : ''}>
        ${icon('refresh')} ${_rotating ? 'Rotating…' : 'Rotate key'}
      </button>`;
  } else {
    keySection = `
      <div class="field-row">
        <code class="field-code masked">●●●●●●●●●●●●</code>
      </div>
      <button class="text-link" onclick="handleGenerateOrRotate()" ${_rotating ? 'disabled' : ''}>
        ${icon('refresh')} ${_rotating ? 'Rotating…' : 'Rotate key'}
      </button>`;
  }

  const sessionRows = sessionIds.length > 0
    ? [...sessionIds].reverse().map(id => `
        <div class="session-row">
          ${icon('video')} <code class="session-id">${esc(id)}</code>
        </div>`).join('')
    : `<div style="font-size:12px;color:#94a3b8;font-style:italic;padding:4px 0;">
        No sessions yet. Start streaming to OBS with the key above.
      </div>`;

  const metaItems = [
    `<span><strong>Session type:</strong> ${esc(targetType)}</span>`,
    agents.length > 0 ? `<span><strong>Agents:</strong> ${agents.length}</span>` : '',
    stream.language_code ? `<span><strong>Transcription:</strong> ${esc(stream.language_code)}</span>` : '',
  ].filter(Boolean).join('');

  app.innerHTML = `
    <div class="header">
      <span style="display:inline-flex;color:${isLive ? '#ef4444' : '#94a3b8'};">${icon('radio')}</span>
      <span class="header-title">${esc(c.title || _artifactData.artifact_id || 'Stream Source')}</span>
      ${isLive
        ? `<span class="live-badge"><span class="live-dot"></span>Live</span>`
        : `<span class="idle-label">Idle</span>`}
    </div>

    <div class="btn-grid">
      <button
        class="btn ${isLive ? 'btn-live' : 'btn-gray'}"
        disabled
        title="Open the source workspace to manage live output artifacts"
      >
        ${icon('video')} Watch / Listen
      </button>
      <button
        class="btn ${latestSession && !isLive ? 'btn-blue' : 'btn-gray'}"
        onclick="handleTranscribe()"
        ${!latestSession || isLive || _transcribing ? 'disabled' : ''}
      >
        ${icon('text')} ${_transcribing ? 'Transcribing…' : 'Transcribe Latest'}
      </button>
    </div>

    ${streamIngestUrl ? `<div>
      <div class="section-label">Server URL</div>
      <div class="field-row">
        <code class="field-code">${esc(streamIngestUrl)}</code>
        <button class="icon-btn" onclick="navigator.clipboard.writeText(${JSON.stringify(streamIngestUrl)})" title="Copy URL">${icon('copy')}</button>
      </div>
    </div>` : ''}

    <div>
      <div class="section-label">Stream Key</div>
      ${keySection}
    </div>

    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}

    <div>
      <div class="section-label">Sessions (${sessionIds.length})</div>
      <div class="sessions-list">${sessionRows}</div>
    </div>
  `;
}
</script>
</body>
</html>
