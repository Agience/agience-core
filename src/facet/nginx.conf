server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Scanner / noise control -------------------------------------------
    # Vulnerability scanners constantly probe for PHP / WordPress endpoints
    # this app does not have. Answer with a fast 404 and don't log it, rather
    # than serving the ~1.4KB SPA shell with a 200 (which wastes bytes and
    # hands the scanner a "success"). Denylist — extend as new probes appear.
    location ~* \.(?:php|aspx?|jsp|cgi)$ {
        access_log off;
        return 404;
    }
    location ~* ^/(?:wp-|wordpress|xmlrpc|phpmyadmin|\.env|\.git) {
        access_log off;
        return 404;
    }

    # Browsers auto-request these. Serve them if the build ships them, else
    # 404 quietly so they don't spam the error log. (To brand the tab / guide
    # crawlers, drop a favicon.ico / robots.txt into Facet's public/ dir.)
    location = /favicon.ico { try_files $uri =404; access_log off; log_not_found off; }
    location = /robots.txt  { try_files $uri =404; access_log off; log_not_found off; }

    # --- Static assets ------------------------------------------------------
    # Hashed build assets: cache hard. A missing asset must 404 — never fall
    # back to index.html, or the browser would cache HTML under a .js/.css URL
    # and break the app. (log_not_found stays on: a missing hashed asset is a
    # real signal that a deploy is broken.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No cache for the entry HTML / runtime config so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # --- SPA fallback -------------------------------------------------------
    # Any other path serves index.html (200) so client-side routes and deep
    # links resolve; the React router renders its own 404 view for unknown
    # routes. A hard 404 here would break valid links like /workspaces/<id>,
    # so a 200 for "unknown" paths is correct SPA behavior, not a bug.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
